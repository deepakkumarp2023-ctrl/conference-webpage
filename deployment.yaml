apiVersion: apps/v1
kind: Deployment
metadata:
  name: conference-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: conference
  template:
    metadata:
      labels:
        app: conference
    spec:
      containers:
      - name: conference-web
        image: conference-app:latest
        imagePullPolicy: Never # Uses local image
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: conference-service
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30001
  selector:
    app: conference